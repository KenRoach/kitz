name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: Kitz Gateway (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kitz_gateway_ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kitz_gateway_ts/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  frontend:
    name: RenewFlow Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: renewflo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: renewflo/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm test
      - run: npm run build

  kitz-web:
    name: KitZ Next.js Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kitz/web build

  docker:
    name: Docker Builds
    runs-on: ubuntu-latest
    needs: [gateway, frontend, kitz-web]
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway
        run: docker build -t kitz-gateway .
      - name: Build factory-api
        run: docker build --build-arg SERVICE=factory-api -f docker/Dockerfile.service -t kitz-factory-api .
      - name: Build renewflo
        run: docker build -f docker/Dockerfile.renewflo -t kitz-renewflo .
