name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: KitZ OS Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kitz_gateway_ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kitz_gateway_ts/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [gateway]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t kitz-os .
