<style>
:root {

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {

.course-meta-bar {

}

/* --- LESSONS --- */
.lessons-container {
  max-width:860px;margin:0 auto;padding:3rem 5% 5rem;
}
.lesson {
  border:1px solid var(--border-dim);margin-bottom:0.8rem;

}
.lesson:hover { border-color:var(--border-med); }
.lesson-header {

.lesson-num {

.lesson-title {

}
.lesson-duration {
  font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--text-muted);
}
.lesson-toggle {
  color:var(--text-muted);font-size:1.2rem;transition:transform 0.3s;
}
.lesson.open .lesson-toggle { transform:rotate(180deg); }
.lesson-body {
  display:none;padding:0 1.6rem 1.6rem;

.lesson.open .lesson-body { display:block; }
.lesson-body p {
  color:var(--text-gray);font-size:0.9rem;line-height:1.7;margin-bottom:1rem;

.lesson-body .code-block {
  background:var(--bg-card);padding:1.2rem 1.4rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.8rem;

.lesson-body .tip {

.lesson-body ul {

.lesson-body li { margin-bottom:0.4rem; }

footer {

footer a:hover { opacity:0.8; }
@media(max-width:768px) {

    desc: "Qu\u00e9 es KitZ, c\u00f3mo funciona el gateway de herramientas, y por qu\u00e9 open-source importa. Sin requisitos previos.",
    duration: "1h 30m",
    lessons: [
      {
        title: "\u00bfQu\u00e9 es KitZ?",
        duration: "15 min",
        content: '<p>KitZ es un ecosistema open-source de herramientas de inteligencia artificial dise\u00f1ado para la comunidad latinoamericana de desarrolladores. En su n\u00facleo, es un <strong>gateway de herramientas</strong>: un servidor HTTP ligero que expone funciones invocables a trav\u00e9s de una API REST.</p><p>A diferencia de otros frameworks, KitZ tiene <strong>cero dependencias externas</strong>. Usa exclusivamente la biblioteca est\u00e1ndar de Python, lo que significa que no necesitas pip install, no hay node_modules, y no hay sorpresas de compatibilidad.</p><div class="tip">KitZ es software libre bajo licencia open-source. Puedes usar, modificar y distribuir el c\u00f3digo sin restricciones.</div>'
      },
      {
        title: "Arquitectura del Gateway",
        duration: "20 min",
        content: '<p>El KitZ Gateway se compone de tres capas principales:</p><ul><li><strong>HTTP Server</strong> \u2014 Basado en http.server de Python, escucha en el puerto 8787</li><li><strong>Tool Registry</strong> \u2014 Un diccionario que mapea nombres de tools a funciones Python</li><li><strong>Persistence Layer</strong> \u2014 SQLite con WAL para almacenamiento de datos</li></ul><div class="code-block">Cliente \u2192 HTTP Request \u2192 Gateway \u2192 Tool Registry \u2192 Tool Function\n                                              \u2193\n                                    SQLite DB (opcional)</div><p>Cada tool es una funci\u00f3n pura que recibe par\u00e1metros y devuelve un resultado. No hay estado compartido entre invocaciones.</p>'
      },
      {
        title: "Instalaci\u00f3n y primer inicio",
        duration: "15 min",
        content: '<p>Iniciar el gateway es tan simple como clonar el repositorio y ejecutar un comando:</p><div class="code-block">git clone https://github.com/KenRoach/kitz.git\ncd kitz\npython -m kitz_gateway</div><p>El servidor se levanta en <code>http://localhost:8787</code>. Puedes verificar que est\u00e1 corriendo con:</p><div class="code-block">curl http://localhost:8787/v0.1/health\n# Respuesta: {"status": "ok", "version": "0.1"}</div><div class="tip">No necesitas instalar nada con pip. Solo Python 3.7+ es requerido.</div>'
      },
      {
        title: "Tu primera llamada al Gateway",
        duration: "15 min",
        content: '<p>Hagamos nuestra primera llamada a un tool del gateway. Usaremos <code>echo</code>, el tool m\u00e1s simple:</p><div class="code-block">curl -X POST http://localhost:8787/v0.1/tools/echo \\\n  -H "Content-Type: application/json" \\\n  -d \'{"message": "Hola desde KitZ!"}\'\n\n# Respuesta:\n# {"result": "Hola desde KitZ!"}</div><p>El patr\u00f3n es siempre el mismo: <code>POST /v0.1/tools/{nombre_del_tool}</code> con un body JSON.</p>'
      },
      {
        title: "Explorando los tools incluidos",
        duration: "15 min",
        content: '<p>El gateway incluye herramientas built-in que puedes usar inmediatamente:</p><ul><li><strong>echo</strong> \u2014 Devuelve el mensaje que le env\u00edas (prueba de conectividad)</li><li><strong>utc_now</strong> \u2014 Retorna el timestamp UTC actual</li><li><strong>sum</strong> \u2014 Suma un array de valores num\u00e9ricos</li><li><strong>list_assets</strong> \u2014 Consulta activos con filtros</li><li><strong>get_asset_metrics</strong> \u2014 M\u00e9tricas del portafolio de activos</li></ul><p>Para ver todas las herramientas disponibles:</p><div class="code-block">curl http://localhost:8787/v0.1/tools\n# Retorna lista de tools con nombres y descripciones</div>'
      },
      {
        title: "Por qu\u00e9 Open Source importa",
        duration: "10 min",
        content: '<p>KitZ es open-source por convicci\u00f3n, no por conveniencia. Estos son los principios del proyecto:</p><ul><li><strong>Accesibilidad</strong> \u2014 El conocimiento y las herramientas deben ser accesibles para todos</li><li><strong>Transparencia</strong> \u2014 Puedes leer, auditar y entender cada l\u00ednea de c\u00f3digo</li><li><strong>Comunidad</strong> \u2014 Construimos mejor cuando construimos juntos</li><li><strong>LATAM first</strong> \u2014 Documentaci\u00f3n en espa\u00f1ol, ejemplos regionales, comunidad local</li></ul><div class="tip">Contribuir a KitZ es una excelente forma de empezar en open-source. El c\u00f3digo es simple, bien documentado, y la comunidad es amigable.</div>'
      }

  "primer-tool": {

    level: "B\u00e1sico",
    title: "Tu Primer Tool con Python",

    lessons: [
      {
        title: "\u00bfQu\u00e9 es un Tool?",
        duration: "15 min",
        content: '<p>Un <strong>tool</strong> en KitZ es simplemente una funci\u00f3n Python que recibe un diccionario de par\u00e1metros y devuelve un resultado. No hay clases abstractas, no hay decoradores m\u00e1gicos, no hay herencia.</p><div class="code-block">def mi_tool(params):\n    """Un tool es una funci\u00f3n simple."""\n    return {"resultado": "algo \u00fatil"}</div><p>El gateway se encarga de recibir el HTTP request, parsear el JSON, invocar tu funci\u00f3n y devolver la respuesta.</p>'
      },
      {
        title: "Estructura de un Tool",
        duration: "20 min",
        content: '<p>Cada tool sigue un patr\u00f3n consistente:</p><div class="code-block">def register(registry):\n    """Se llama al iniciar el gateway."""\n\n    def mi_tool(params):\n        # 1. Extraer par\u00e1metros\n        valor = params.get("clave", "default")\n\n        # 2. Hacer algo \u00fatil\n        resultado = procesar(valor)\n\n        # 3. Retornar resultado\n        return {"result": resultado}\n\n    # Registrar en el gateway\n    registry["mi_tool"] = mi_tool</div><p>La funci\u00f3n <code>register</code> recibe el registry del gateway y a\u00f1ade tu tool al diccionario. Es todo lo que necesitas.</p>'
      },
      {
        title: "Creando un Tool: Conversor de Temperatura",
        duration: "25 min",
        content: '<p>Vamos a crear un tool real que convierte temperaturas entre Celsius y Fahrenheit:</p><div class="code-block">def register(registry):\n    def temp_convert(params):\n        value = params.get("value", 0)\n        from_unit = params.get("from", "C")\n\n        if from_unit.upper() == "C":\n            result = (value * 9/5) + 32\n            to_unit = "F"\n        else:\n            result = (value - 32) * 5/9\n            to_unit = "C"\n\n        return {\n            "original": f"{value}\u00b0{from_unit}",\n            "converted": f"{round(result, 2)}\u00b0{to_unit}"\n        }\n\n    registry["temp_convert"] = temp_convert</div><div class="tip">Nota c\u00f3mo no importamos nada externo. Todo se resuelve con la stdlib de Python.</div>'
      },
      {
        title: "Validaci\u00f3n de par\u00e1metros",
        duration: "20 min",
        content: '<p>Un buen tool valida sus inputs antes de procesarlos:</p><div class="code-block">def register(registry):\n    def safe_divide(params):\n        a = params.get("a")\n        b = params.get("b")\n\n        if a is None or b is None:\n            return {"error": "Se requieren par\u00e1metros \'a\' y \'b\'"}\n\n        if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):\n            return {"error": "\'a\' y \'b\' deben ser n\u00fameros"}\n\n        if b == 0:\n            return {"error": "No se puede dividir por cero"}\n\n        return {"result": a / b}\n\n    registry["safe_divide"] = safe_divide</div><p>Siempre retorna un diccionario, incluso en caso de error. El gateway se encarga de enviar el JSON al cliente.</p>'
      },
      {
        title: "Probando tu Tool localmente",
        duration: "20 min",
        content: '<p>Puedes probar tu tool directamente con Python antes de integrarlo al gateway:</p><div class="code-block"># test_mi_tool.py\nfrom kitz_gateway.tools import temp_convert\n\n# Test b\u00e1sico\nresult = temp_convert.register.__wrapped__({"value": 100, "from": "C"})\nprint(result)\n# {"original": "100\u00b0C", "converted": "212.0\u00b0F"}\n\n# Test con el gateway corriendo\nimport json\nfrom urllib.request import urlopen, Request\n\nreq = Request(\n    "http://localhost:8787/v0.1/tools/temp_convert",\n    data=json.dumps({"value": 0, "from": "C"}).encode(),\n    headers={"Content-Type": "application/json"},\n    method="POST"\n)\nresp = json.loads(urlopen(req).read())\nprint(resp)</div>'
      },
      {
        title: "Tools con fecha y hora",
        duration: "20 min",
        content: '<p>Creemos un tool que trabaja con fechas usando el m\u00f3dulo <code>datetime</code> de la stdlib:</p><div class="code-block">from datetime import datetime, timezone\n\ndef register(registry):\n    def days_between(params):\n        fmt = "%Y-%m-%d"\n        start = datetime.strptime(params["start"], fmt)\n        end = datetime.strptime(params["end"], fmt)\n        diff = abs((end - start).days)\n        return {\n            "start": params["start"],\n            "end": params["end"],\n            "days": diff\n        }\n\n    registry["days_between"] = days_between</div><p>El m\u00f3dulo <code>datetime</code> es parte de la biblioteca est\u00e1ndar. No se viola el principio de cero dependencias.</p>'
      },
      {
        title: "Tools con generaci\u00f3n de datos",
        duration: "20 min",
        content: '<p>Un tool \u00fatil: generar UUIDs y datos aleatorios para testing:</p><div class="code-block">import uuid\nimport random\nimport string\n\ndef register(registry):\n    def generate_id(params):\n        fmt = params.get("format", "uuid")\n\n        if fmt == "uuid":\n            return {"id": str(uuid.uuid4())}\n        elif fmt == "short":\n            chars = string.ascii_lowercase + string.digits\n            short = "".join(random.choices(chars, k=8))\n            return {"id": short}\n        else:\n            return {"error": f"Formato desconocido: {fmt}"}\n\n    registry["generate_id"] = generate_id</div><div class="tip">uuid, random y string son todos m\u00f3dulos de la stdlib. Puedes usar cualquier m\u00f3dulo que venga con Python.</div>'

      {
        title: "Publicando tu Tool",
        duration: "25 min",
        content: '<p>Para a\u00f1adir tu tool al gateway, solo necesitas:</p><ul><li>Crear un archivo .py en la carpeta de tools</li><li>Implementar la funci\u00f3n <code>register(registry)</code></li><li>Reiniciar el gateway</li></ul><div class="code-block"># Estructura del proyecto:\nkitz_gateway/\n  tools/\n    echo.py\n    utc_now.py\n    sum.py\n    mi_tool.py    \u2190 tu nuevo tool\n  server.py\n  db.py</div><p>El gateway auto-descubre todos los archivos .py en la carpeta tools y llama a <code>register()</code> en cada uno.</p><div class="tip">\u00bfTerminaste tu tool? Haz un fork del repo, a\u00f1ade tu tool y env\u00eda un Pull Request. As\u00ed contribuyes a open-source.</div>'

    duration: "3h 20m",
    lessons: [
      {
        title: "Fundamentos de REST",
        duration: "20 min",
        content: '<p>REST (Representational State Transfer) es un estilo de arquitectura para APIs. Los conceptos clave:</p><ul><li><strong>Recursos</strong> \u2014 Todo es un recurso identificado por una URL</li><li><strong>M\u00e9todos HTTP</strong> \u2014 GET (leer), POST (crear), PUT (actualizar), DELETE (eliminar)</li><li><strong>Stateless</strong> \u2014 Cada request contiene toda la informaci\u00f3n necesaria</li><li><strong>JSON</strong> \u2014 Formato est\u00e1ndar para intercambio de datos</li></ul><p>El KitZ Gateway implementa un subconjunto pragm\u00e1tico: GET para consultas y POST para invocar tools.</p>'
      },
      {
        title: "Endpoints del Gateway",
        duration: "20 min",
        content: '<p>El gateway expone estos endpoints bajo el prefijo <code>/v0.1</code>:</p><div class="code-block">GET  /v0.1/health          \u2192 Estado del servidor\nGET  /v0.1/tools            \u2192 Lista de tools disponibles\nPOST /v0.1/tools/{name}     \u2192 Invocar un tool espec\u00edfico</div><p>El versionado <code>/v0.1</code> permite evolucionar la API sin romper clientes existentes. Cuando haya cambios incompatibles, se crea <code>/v0.2</code>.</p>'
      },
      {
        title: "Request y Response en detalle",

        content: '<p>Anatom\u00eda de una llamada al gateway:</p><div class="code-block"># REQUEST\nPOST /v0.1/tools/sum HTTP/1.1\nHost: localhost:8787\nContent-Type: application/json\nContent-Length: 25\n\n{"values": [10, 20, 30]}\n\n# RESPONSE\nHTTP/1.1 200 OK\nContent-Type: application/json\n\n{"result": 60}</div><p>Siempre env\u00eda <code>Content-Type: application/json</code>. El gateway rechaza requests sin este header.</p>'
      },

        title: "Consumir desde JavaScript",

      },
      {
        title: "Consumir desde Python",
        duration: "20 min",
        content: '<p>Desde otro script Python usando solo la stdlib:</p><div class="code-block">import json\nfrom urllib.request import urlopen, Request\n\ndef call_gateway(tool, params=None):\n    url = f"http://localhost:8787/v0.1/tools/{tool}"\n    data = json.dumps(params or {}).encode("utf-8")\n    req = Request(\n        url,\n        data=data,\n        headers={"Content-Type": "application/json"},\n        method="POST"\n    )\n    with urlopen(req) as resp:\n        return json.loads(resp.read())\n\n# Uso:\nresult = call_gateway("sum", {"values": [1, 2, 3]})\nprint(result)  # {"result": 6}</div>'
      },
      {

// --- Load course from URL ---
const params = new URLSearchParams(window.location.search);
const courseId = params.get("id");

if (courseId && courses[courseId]) {
  const course = courses[courseId];
  document.title = course.title + " \u2014 KitZ Academy";
  document.getElementById("courseEyebrow").textContent = "// " + course.level.toLowerCase() + " \u00b7 " + course.lessons.length + " lecciones";
  document.getElementById("courseTitle").textContent = course.icon + " " + course.title;
  document.getElementById("courseDesc").textContent = course.desc;
  document.getElementById("courseMeta").innerHTML =
    "<span>\u{1F551} " + course.duration + "</span>" +
    "<span>\u{1F4DA} " + course.lessons.length + " lecciones</span>" +
    "<span>\u{1F3AF} " + course.level + "</span>";

  const container = document.getElementById("lessonsContainer");
  course.lessons.forEach(function(lesson, i) {
    const div = document.createElement("div");
    div.className = "lesson";
    div.innerHTML =
      '<div class="lesson-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
        '<span class="lesson-num">' + String(i + 1).padStart(2, "0") + '</span>' +
        '<span class="lesson-title">' + lesson.title + '</span>' +
        '<span class="lesson-duration">' + lesson.duration + '</span>' +
        '<span class="lesson-toggle">\u25BC</span>' +
      '</div>' +
      '<div class="lesson-body">' + lesson.content + '</div>';
    container.appendChild(div);
  });

  // Auto-open first lesson
  var firstLesson = container.querySelector(".lesson");
  if (firstLesson) firstLesson.classList.add("open");
} else {
  document.getElementById("courseTitle").textContent = "Curso no encontrado";
  document.getElementById("courseDesc").textContent = "El curso que buscas no existe. Vuelve a la p\u00e1gina principal.";
}
